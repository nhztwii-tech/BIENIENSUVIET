<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biên Niên Sử Việt - Hành Trình Di Sản</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@300;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #f0d060;
            --gold-dim: rgba(212,175,55,0.15);
            --red: #8B0000;
            --ink: #1a1a1a;
            --paper: #f4f1ea;
            --paper-dark: #ede9df;
            --white: #ffffff;
            --zinc-100: #f4f4f5;
            --zinc-200: #e4e4e7;
            --zinc-400: #a1a1aa;
            --zinc-500: #71717a;
            --zinc-700: #3f3f46;
            --zinc-800: #27272a;
            --zinc-900: #18181b;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--paper);
            color: var(--ink);
            overflow-x: hidden;
        }

        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }

        /* ─── HEADER ─── */
        header {
            position: relative;
            min-height: 45vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--zinc-900);
            color: white;
            text-align: center;
            overflow: hidden;
            padding: 2rem 1rem;
        }

        .header-bg {
            position: absolute;
            inset: 0;
            background-image: url('https://chatgpt.com/backend-api/estuary/content?id=file_00000000a7387209835583e0618eba13&ts=493761&p=fs&cid=1&sig=92692547dd9678dc34b0468fb763217983d920438c479f29c3ba598d7f5ece5a&v=0');
            background-size: cover;
            background-position: center;
            opacity: 0.35;
        }

        .header-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(24,24,27,0.3) 0%, rgba(24,24,27,0.7) 100%);
        }

        .header-content {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 800px;
            animation: fadeUp 0.8s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .header-title {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 700;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        /* ─── SEARCH ─── */
        .search-wrap {
            position: relative;
            max-width: 520px;
            margin: 1.5rem auto;
        }

        .search-wrap input {
            width: 100%;
            padding: 0.9rem 3rem 0.9rem 1.2rem;
            border-radius: 0.75rem;
            border: none;
            background: white;
            font-family: inherit;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            outline: none;
        }

        /* ─── TABS (FIXED SCROLL) ─── */
        .tab-nav-container {
            width: 100%;
            overflow: hidden;
            margin-top: 1rem;
        }

        .tab-nav {
            display: flex;
            gap: 0.6rem;
            padding: 0.5rem 1rem;
            overflow-x: auto;
            /* Quan trọng: Để scroll hoạt động tự nhiên */
            justify-content: flex-start; 
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }

        /* Căn giữa nếu nội dung ít, nhưng vẫn cho phép scroll nếu nội dung nhiều */
        @media (min-width: 768px) {
            .tab-nav { justify-content: center; }
        }

        .tab-nav::-webkit-scrollbar { display: none; }

        .tab-btn {
            white-space: nowrap;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            border: none;
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .tab-btn.active-tab {
            background: var(--gold);
            color: var(--zinc-900);
        }

        /* ─── MAIN ─── */
        main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        #contentSection { display: flex; flex-direction: column; gap: 4rem; }

        .char-card {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s ease-out;
        }

        .char-card.visible { opacity: 1; transform: translateY(0); }

        @media (min-width: 768px) {
            .char-card { grid-template-columns: 320px 1fr; }
        }

        .profile-card {
            background: white;
            border-radius: 1.25rem;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: sticky;
            top: 2rem;
            height: fit-content;
        }

        .profile-img {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
        }

        .profile-info { padding: 1.5rem; text-align: center; }

        /* ─── ACCORDIONS ─── */
        .accordions { display: flex; flex-direction: column; gap: 0.75rem; }
        details {
            background: white;
            border-radius: 0.75rem;
            border: 1px solid var(--zinc-200);
        }
        summary {
            padding: 1rem;
            cursor: pointer;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .acc-body {
            padding: 1rem;
            border-top: 1px solid var(--zinc-100);
            line-height: 1.8;
            font-size: 0.95rem;
        }

        /* TOOLTIP */
        .tooltip-link {
            color: var(--red);
            font-weight: 600;
            border-bottom: 1.5px dashed var(--gold);
            cursor: help;
            position: relative;
        }

        .tooltip-box {
            visibility: hidden;
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            background: #18181b;
            color: white;
            padding: 0.75rem;
            border-radius: 0.5rem;
            width: 220px;
            z-index: 100;
            font-size: 0.8rem;
            line-height: 1.4;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            pointer-events: none;
        }
        .tooltip-link:hover .tooltip-box { visibility: visible; }
    </style>
</head>
<body>

<header>
    <div class="header-bg"></div>
    <div class="header-overlay"></div>
    <div class="header-content">
        <h1 class="header-title">Biên Niên Sử Việt</h1>
        <div class="search-wrap">
            <input type="text" id="searchInput" placeholder="Tìm tên anh hùng hoặc thời kỳ..." autocomplete="off">
        </div>
        <div class="tab-nav-container">
            <nav class="tab-nav" id="tabNav"></nav>
        </div>
    </div>
</header>

<main>
    <div id="contentSection"></div>
</main>

<script src="data.js"></script>
<script>
    // 1. Dữ liệu và Config
    const DATA = window.HISTORICAL_DATA || [];
    let currentTab = "Tất cả";
    
    // Tạo Map dữ liệu để truy xuất O(1) thay vì O(N)
    const dataMap = new Map(DATA.map(item => [item.name, item]));
    
    // 2. TỐI ƯU QUAN TRỌNG: Tạo 1 Regex duy nhất cho tất cả tên nhân vật
    // Điều này giúp hàm formatLinks chỉ chạy 1 lần quét thay vì lặp lại theo số nhân vật
    const allNamesPattern = DATA.map(d => d.name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|');
    const globalNameRegex = new RegExp(`\\b(${allNamesPattern})\\b`, 'g');

    const SECTION_CONFIG = [
        { key: 'summary',    title: 'I. Tóm lược', emoji: '📜', open: true },
        { key: 'biography',  title: 'II. Tiểu sử', emoji: '👤' },
        { key: 'activities', title: 'III. Hoạt động', emoji: '⚔️' },
        { key: 'legacy',     title: 'IV. Di sản', emoji: '❤️' },
    ];

    const contentSection = document.getElementById('contentSection');
    const tabNav = document.getElementById('tabNav');
    const searchInput = document.getElementById('searchInput');

    function initApp() {
        const periods = ["Tất cả", ...new Set(DATA.map(d => d.period))];
        tabNav.innerHTML = '';
        periods.forEach(p => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn' + (p === currentTab ? ' active-tab' : '');
            btn.textContent = p;
            btn.onclick = () => { 
                currentTab = p; 
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
                btn.classList.add('active-tab');
                renderContent();
            };
            tabNav.appendChild(btn);
        });
        renderContent();
    }

    // 3. Render hiệu năng cao
    function renderContent() {
        const q = searchInput.value.toLowerCase().trim();
        const filtered = DATA.filter(item => {
            const matchTab = currentTab === "Tất cả" || item.period === currentTab;
            const matchSearch = !q || 
                item.name.toLowerCase().includes(q) || 
                item.period.toLowerCase().includes(q);
            return matchTab && matchSearch;
        });

        contentSection.innerHTML = '';
        
        // Sử dụng Fragment để tránh reflow liên tục
        const fragment = document.createDocumentFragment();

        filtered.forEach((item, i) => {
            const card = document.createElement('div');
            card.className = 'char-card';
            
            // Build nội dung cơ bản trước
            card.innerHTML = `
                <div class="profile-wrap">
                    <div class="profile-card">
                        <img src="${item.image}" class="profile-img" loading="lazy" onerror="this.src='https://placehold.co/400x500?text=Lịch+Sử+Việt'">
                        <div class="profile-info">
                            <h2 class="serif">${item.name}</h2>
                            <p style="color:var(--gold); font-weight:700; margin: 0.5rem 0;">${item.year}</p>
                            <span style="font-size:0.7rem; background:var(--gold-dim); padding:0.2rem 0.6rem; border-radius:1rem;">${item.period}</span>
                        </div>
                    </div>
                </div>
                <div class="accordions">
                    ${SECTION_CONFIG.map(s => buildAccordion(s, item[s.key], item.name)).join('')}
                </div>
            `;
            fragment.appendChild(card);
        });

        contentSection.appendChild(fragment);
        setupReveal();
    }

    function buildAccordion(cfg, content, currentName) {
        if (!content) return '';
        return `
            <details ${cfg.open ? 'open' : ''}>
                <summary>
                    <span>${cfg.emoji} ${cfg.title}</span>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m6 9 12 0-6 6z"/></svg>
                </summary>
                <div class="acc-body">${formatLinks(content, currentName)}</div>
            </details>
        `;
    }

    // 4. Hàm Format tối ưu O(N)
    function formatLinks(text, currentName) {
        if (!text) return '';
        
        // Bước 1: Xử lý xuống dòng
        let processed = text.replace(/\\n/g, '<br>');

        // Bước 2: Dùng Regex duy nhất thay thế toàn bộ tên nhân vật
        // Tránh replace tên của chính nhân vật đang xem
        return processed.replace(globalNameRegex, (match) => {
            if (match === currentName) return match;
            
            const p = dataMap.get(match);
            if (!p) return match;

            const sum = p.summary ? p.summary.substring(0, 80) + '...' : 'Đang cập nhật...';
            
            return `<span class="tooltip-link">${match}
                <span class="tooltip-box">
                    <strong>${p.name}</strong><br>
                    <small>${p.period}</small><br>
                    <p style="font-size:0.7rem; margin-top:0.3rem; opacity:0.8">${sum}</p>
                </span>
            </span>`;
        });
    }

    function setupReveal() {
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.char-card').forEach(c => observer.observe(c));
    }

    let searchTimeout;
    searchInput.addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(renderContent, 300); // Debounce để không render liên tục khi gõ
    });

    window.onload = initApp;
</script>
</body>
</html>
